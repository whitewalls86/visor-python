name: Bug report
description: Report a problem with visor-python.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

        Please do not include API keys, secrets, or sensitive live API response data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly and briefly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code or steps that reproduce the issue.
      render: python
      placeholder: |
        from visor import VisorClient

        with VisorClient(api_key="...") as client:
            ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include traceback text if available.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: visor-python version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Client type
      options:
        - Sync VisorClient
        - Async AsyncVisorClient
        - Both
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details that may help. Redact secrets and identifiers if needed.
