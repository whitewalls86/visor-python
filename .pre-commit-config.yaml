repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format-check
        name: ruff format --check
        entry: ruff format --check .
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
